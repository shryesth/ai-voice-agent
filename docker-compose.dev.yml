services:
  # MongoDB Database
  mongodb:
    image: mongo:8.0.17
    container_name: shifo-supervisor-mongodb
    restart: unless-stopped
    # Uncomment next line to suppress startup warnings (optional)
    # command: ["mongod", "--quiet"]
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: voice_agent
    networks:
      - shifo-supervisor-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/voice_agent --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache & Message Broker
  redis:
    image: redis:7-alpine
    container_name: shifo-supervisor-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - shifo-supervisor-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MinIO Object Storage (Local Development)
  minio:
    image: minio/minio:RELEASE.2025-01-20T14-49-07Z
    container_name: shifo-supervisor-minio
    restart: unless-stopped
    ports:
      - "9000:9000"      # S3 API endpoint
      - "9001:9001"      # MinIO Console (Web UI)
    volumes:
      - minio_data:/data
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    command: server /data --console-address ":9001"
    networks:
      - shifo-supervisor-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # FastAPI Application Server
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: shifo-supervisor-api
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./backend:/app/backend:ro
      - ./scripts:/app/scripts:ro
    env_file:
      - config/.env.local
    environment:
      - MONGODB_URI=mongodb://mongodb:27017
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - S3_ENDPOINT_URL=http://minio:9000
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - shifo-supervisor-network
    command: uvicorn backend.app.main:app --host 0.0.0.0 --port 3000 --reload

  # Celery Worker
  celery-worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.worker
    container_name: shifo-supervisor-celery-worker
    restart: unless-stopped
    volumes:
      - ./backend:/app/backend:ro
    env_file:
      - config/.env.local
    environment:
      - MONGODB_URI=mongodb://mongodb:27017
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - S3_ENDPOINT_URL=http://minio:9000
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - shifo-supervisor-network

  # Celery Beat Scheduler
  celery-beat:
    build:
      context: .
      dockerfile: docker/Dockerfile.beat
    container_name: shifo-supervisor-celery-beat
    restart: unless-stopped
    volumes:
      - ./backend:/app/backend:ro
    env_file:
      - config/.env.local
    environment:
      - MONGODB_URI=mongodb://mongodb:27017
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - shifo-supervisor-network

networks:
  shifo-supervisor-network:
    driver: bridge

volumes:
  mongodb_data:
  redis_data:
  minio_data:
