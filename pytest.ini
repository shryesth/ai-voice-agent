[pytest]
# Test discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test organization
markers =
    contract: Contract tests for API endpoints
    integration: Integration tests for external services
    unit: Unit tests for isolated components
    slow: Tests that take longer than 1 second
    voice: Tests involving voice pipeline
    queue: Tests involving queue processing
    auth: Tests involving authentication

# Async support
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function

# Output settings
addopts =
    -ra
    --strict-markers
    --strict-config
    --showlocals
    --tb=short
    --cov=backend
    --cov-report=term-missing
    --cov-report=html
    --cov-report=xml
    --cov-branch
    --no-cov-on-fail

# Coverage settings
[coverage:run]
source = backend
omit =
    */tests/*
    */test_*
    */__pycache__/*
    */site-packages/*
    */venv/*
    */.venv/*

[coverage:report]
precision = 2
show_missing = True
skip_covered = False
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstractmethod

# Minimum coverage threshold
fail_under = 80
